<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>r34</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,600;1,9..144,300;1,9..144,400&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #0a0a0a;
  --surface: #141414;
  --surface-2: #1c1c1c;
  --border: #2a2a2a;
  --text: #e8e4df;
  --text-dim: #7a7570;
  --accent: #c8956c;
  --accent-glow: rgba(200, 149, 108, 0.15);
  --accent-hot: #e07a4a;
  --radius: 6px;
  --radius-lg: 12px;
  --font-display: 'Fraunces', Georgia, serif;
  --font-body: 'DM Sans', 'Helvetica Neue', sans-serif;
  --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
  --ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1);
}

html { scroll-behavior: smooth; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-body);
  font-weight: 300;
  line-height: 1.6;
  overflow-x: hidden;
  min-height: 100vh;
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  background: radial-gradient(ellipse 80% 60% at 50% 0%, rgba(200,149,108,0.04) 0%, transparent 70%);
  pointer-events: none;
  z-index: 0;
}

/* ── HEADER ── */
.header {
  position: sticky;
  top: 0;
  z-index: 100;
  background: rgba(10,10,10,0.85);
  backdrop-filter: blur(20px) saturate(1.2);
  -webkit-backdrop-filter: blur(20px) saturate(1.2);
  border-bottom: 1px solid var(--border);
  padding: 0 2rem;
}

.header-inner {
  max-width: 1600px;
  margin: 0 auto;
  display: flex;
  align-items: center;
  gap: 2rem;
  height: 72px;
}

.logo {
  font-family: var(--font-display);
  font-size: 1.5rem;
  font-weight: 300;
  letter-spacing: 0.02em;
  color: var(--text);
  white-space: nowrap;
  flex-shrink: 0;
}

.logo span {
  color: var(--accent);
  font-style: italic;
}

/* ── SEARCH ── */
.search-wrap {
  flex: 1;
  max-width: 640px;
  position: relative;
}

.search-bar {
  width: 100%;
  display: flex;
  align-items: center;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 100px;
  padding: 0 1rem 0 1.25rem;
  height: 44px;
  transition: border-color 0.3s var(--ease-out), box-shadow 0.3s var(--ease-out);
}

.search-bar:focus-within {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-glow);
}

.search-icon {
  width: 18px;
  height: 18px;
  color: var(--text-dim);
  flex-shrink: 0;
  transition: color 0.3s;
}

.search-bar:focus-within .search-icon { color: var(--accent); }

.search-input {
  flex: 1;
  background: none;
  border: none;
  outline: none;
  color: var(--text);
  font-family: var(--font-body);
  font-size: 0.9rem;
  font-weight: 400;
  padding: 0 0.75rem;
  letter-spacing: 0.01em;
}

.search-input::placeholder { color: var(--text-dim); }

.search-btn {
  background: var(--accent);
  color: var(--bg);
  border: none;
  border-radius: 100px;
  padding: 0.45rem 1.25rem;
  font-family: var(--font-body);
  font-size: 0.8rem;
  font-weight: 500;
  letter-spacing: 0.04em;
  text-transform: uppercase;
  cursor: pointer;
  transition: background 0.2s, transform 0.15s var(--ease-spring);
  flex-shrink: 0;
}

.search-btn:hover { background: var(--accent-hot); }
.search-btn:active { transform: scale(0.96); }

/* ── AUTOCOMPLETE ── */
.autocomplete-list {
  position: absolute;
  top: calc(100% + 6px);
  left: 0;
  right: 0;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  overflow: hidden;
  display: none;
  z-index: 200;
  box-shadow: 0 12px 40px rgba(0,0,0,0.5);
  max-height: 260px;
  overflow-y: auto;
}

.autocomplete-list.active { display: block; }

.autocomplete-item {
  padding: 0.65rem 1.25rem;
  font-size: 0.85rem;
  cursor: pointer;
  transition: background 0.15s;
  display: flex;
  align-items: center;
  gap: 0.5rem;
  border-bottom: 1px solid var(--border);
}

.autocomplete-item:last-child { border-bottom: none; }
.autocomplete-item:hover, .autocomplete-item.active { background: var(--surface-2); }

.autocomplete-item .tag-count {
  margin-left: auto;
  font-size: 0.7rem;
  color: var(--text-dim);
  font-variant-numeric: tabular-nums;
}

.autocomplete-item .match { color: var(--accent); font-weight: 500; }

/* ── ACTIVE TAGS ── */
.tags-bar {
  max-width: 1600px;
  margin: 0 auto;
  padding: 1rem 2rem 0;
  display: flex;
  flex-wrap: wrap;
  gap: 0.5rem;
  align-items: center;
  min-height: 2.5rem;
}

.tags-bar:empty { display: none; }

.tag-pill {
  display: inline-flex;
  align-items: center;
  gap: 0.35rem;
  background: var(--surface-2);
  border: 1px solid var(--border);
  border-radius: 100px;
  padding: 0.3rem 0.75rem 0.3rem 0.85rem;
  font-size: 0.78rem;
  font-weight: 400;
  color: var(--text);
  cursor: default;
  animation: tagIn 0.3s var(--ease-spring);
}

@keyframes tagIn {
  from { opacity: 0; transform: scale(0.85); }
  to { opacity: 1; transform: scale(1); }
}

.tag-pill .remove {
  width: 16px;
  height: 16px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 50%;
  background: rgba(255,255,255,0.06);
  cursor: pointer;
  font-size: 0.7rem;
  color: var(--text-dim);
  transition: background 0.15s, color 0.15s;
}

.tag-pill .remove:hover { background: rgba(255,255,255,0.12); color: var(--text); }

.tag-pill .count-badge {
  background: var(--accent);
  color: var(--bg);
  font-size: 0.65rem;
  font-weight: 500;
  padding: 0.1rem 0.4rem;
  border-radius: 100px;
  font-variant-numeric: tabular-nums;
}

/* ── TOOLBAR ── */
.toolbar {
  max-width: 1600px;
  margin: 0 auto;
  padding: 0.75rem 2rem 0;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.toolbar.hidden { display: none; }

.result-info {
  font-size: 0.8rem;
  color: var(--text-dim);
  font-variant-numeric: tabular-nums;
}

.result-info strong { color: var(--text); font-weight: 500; }

.sort-wrap {
  display: flex;
  align-items: center;
  gap: 0.5rem;
}

.sort-label {
  font-size: 0.75rem;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 0.06em;
}

.sort-select {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  color: var(--text);
  font-family: var(--font-body);
  font-size: 0.8rem;
  padding: 0.35rem 0.6rem;
  cursor: pointer;
  outline: none;
  transition: border-color 0.2s;
}

.sort-select:focus { border-color: var(--accent); }

/* ── GALLERY GRID ── */
.gallery {
  max-width: 1600px;
  margin: 0 auto;
  padding: 1.25rem 2rem 4rem;
  columns: 4;
  column-gap: 0.75rem;
}

@media (max-width: 1200px) { .gallery { columns: 3; } }
@media (max-width: 860px) { .gallery { columns: 2; } }
@media (max-width: 540px) { .gallery { columns: 1; max-width: 480px; } }

.gallery-item {
  break-inside: avoid;
  margin-bottom: 0.75rem;
  position: relative;
  border-radius: var(--radius-lg);
  overflow: hidden;
  cursor: pointer;
  background: var(--surface);
  animation: itemIn 0.5s var(--ease-out) both;
}

@keyframes itemIn {
  from { opacity: 0; transform: translateY(20px) scale(0.97); }
  to { opacity: 1; transform: translateY(0) scale(1); }
}

.gallery-item img, .gallery-item video {
  width: 100%;
  display: block;
  transition: transform 0.4s var(--ease-out);
}

.gallery-item:hover img, .gallery-item:hover video {
  transform: scale(1.03);
}

.gallery-overlay {
  position: absolute;
  inset: 0;
  background: linear-gradient(0deg, rgba(0,0,0,0.7) 0%, transparent 40%);
  opacity: 0;
  transition: opacity 0.3s;
  display: flex;
  flex-direction: column;
  justify-content: flex-end;
  padding: 1rem;
}

.gallery-item:hover .gallery-overlay { opacity: 1; }

.overlay-tags {
  display: flex;
  flex-wrap: wrap;
  gap: 0.3rem;
  margin-bottom: 0.5rem;
}

.overlay-tag {
  font-size: 0.65rem;
  background: rgba(255,255,255,0.12);
  backdrop-filter: blur(6px);
  padding: 0.15rem 0.5rem;
  border-radius: 100px;
  color: rgba(255,255,255,0.85);
  letter-spacing: 0.02em;
}

.overlay-stats {
  display: flex;
  gap: 0.75rem;
  font-size: 0.72rem;
  color: rgba(255,255,255,0.7);
  font-variant-numeric: tabular-nums;
}

.overlay-stats span { display: flex; align-items: center; gap: 0.25rem; }

.video-badge {
  position: absolute;
  top: 0.75rem;
  right: 0.75rem;
  background: rgba(0,0,0,0.6);
  backdrop-filter: blur(6px);
  border-radius: 100px;
  padding: 0.25rem 0.6rem;
  font-size: 0.65rem;
  color: #fff;
  display: flex;
  align-items: center;
  gap: 0.3rem;
  opacity: 0;
  transition: opacity 0.3s;
}

.gallery-item:hover .video-badge { opacity: 1; }

/* ── PAGINATION ── */
.pagination {
  max-width: 1600px;
  margin: 0 auto;
  padding: 0 2rem 4rem;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 0.5rem;
}

.page-btn {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  color: var(--text);
  font-family: var(--font-body);
  font-size: 0.85rem;
  width: 40px;
  height: 40px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: all 0.2s;
}

.page-btn:hover { border-color: var(--accent); background: var(--surface-2); }
.page-btn.active { background: var(--accent); color: var(--bg); border-color: var(--accent); font-weight: 500; }
.page-btn:disabled { opacity: 0.3; cursor: default; }

.page-ellipsis {
  color: var(--text-dim);
  padding: 0 0.25rem;
  font-size: 0.85rem;
}

/* ── LIGHTBOX ── */
.lightbox {
  position: fixed;
  inset: 0;
  z-index: 1000;
  background: rgba(0,0,0,0.92);
  backdrop-filter: blur(30px);
  display: none;
  align-items: center;
  justify-content: center;
  animation: lbIn 0.3s var(--ease-out);
}

.lightbox.active { display: flex; }

@keyframes lbIn {
  from { opacity: 0; }
  to { opacity: 1; }
}

.lightbox-content {
  max-width: 90vw;
  max-height: 85vh;
  position: relative;
  animation: lbContent 0.4s var(--ease-out);
  cursor: zoom-in;
  transition: transform 0.2s var(--ease-out);
  transform-origin: center center;
}

.lightbox-content.zoomed {
  cursor: grab;
  max-width: none;
  max-height: none;
}

.lightbox-content.zoomed:active {
  cursor: grabbing;
}

.lightbox-content img, .lightbox-content video {
  max-width: 90vw;
  max-height: 85vh;
  border-radius: var(--radius-lg);
  object-fit: contain;
  user-select: none;
  -webkit-user-drag: none;
}

.lightbox-content.zoomed img, .lightbox-content.zoomed video {
  max-width: none;
  max-height: none;
  border-radius: 0;
}

@keyframes lbContent {
  from { opacity: 0; transform: scale(0.92); }
  to { opacity: 1; transform: scale(1); }
}

.lightbox-content img, .lightbox-content video {
  max-width: 90vw;
  max-height: 85vh;
  border-radius: var(--radius-lg);
  object-fit: contain;
}

.lightbox-close {
  position: fixed;
  top: 1.5rem;
  right: 1.5rem;
  width: 44px;
  height: 44px;
  border-radius: 50%;
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.1);
  color: #fff;
  font-size: 1.2rem;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background 0.2s;
  z-index: 1001;
}

.lightbox-close:hover { background: rgba(255,255,255,0.15); }

.lightbox-nav {
  position: fixed;
  top: 50%;
  transform: translateY(-50%);
  width: 48px;
  height: 48px;
  border-radius: 50%;
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.08);
  color: #fff;
  font-size: 1.1rem;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background 0.2s;
  z-index: 1001;
}

.lightbox-nav:hover { background: rgba(255,255,255,0.12); }
.lightbox-prev { left: 1.5rem; }
.lightbox-next { right: 1.5rem; }

.lightbox-info {
  position: fixed;
  bottom: 1.5rem;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(0,0,0,0.6);
  backdrop-filter: blur(12px);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 100px;
  padding: 0.5rem 1.25rem;
  display: flex;
  align-items: center;
  gap: 1rem;
  font-size: 0.78rem;
  color: rgba(255,255,255,0.7);
  z-index: 1001;
}

.lightbox-info .lb-counter { color: #fff; font-weight: 500; font-variant-numeric: tabular-nums; }

.lb-zoom-controls {
  position: fixed;
  bottom: 1.5rem;
  right: 1.5rem;
  display: flex;
  align-items: center;
  gap: 0.25rem;
  background: rgba(0,0,0,0.6);
  backdrop-filter: blur(12px);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 100px;
  padding: 0.35rem 0.5rem;
  z-index: 1001;
}

.lb-zoom-btn {
  width: 32px;
  height: 32px;
  border-radius: 50%;
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.08);
  color: #fff;
  font-size: 1rem;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background 0.2s;
  font-family: var(--font-body);
}

.lb-zoom-btn:hover { background: rgba(255,255,255,0.12); }

.lb-zoom-level {
  color: rgba(255,255,255,0.7);
  font-size: 0.72rem;
  min-width: 36px;
  text-align: center;
  font-variant-numeric: tabular-nums;
  user-select: none;
}

/* ── STATES ── */
.empty-state {
  grid-column: 1 / -1;
  text-align: center;
  padding: 6rem 2rem;
  columns: unset;
}

.empty-state .empty-icon {
  font-size: 3rem;
  margin-bottom: 1rem;
  opacity: 0.3;
}

.empty-state h2 {
  font-family: var(--font-display);
  font-size: 1.75rem;
  font-weight: 300;
  margin-bottom: 0.5rem;
}

.empty-state p {
  color: var(--text-dim);
  font-size: 0.9rem;
  max-width: 400px;
  margin: 0 auto;
}

.loading-state {
  columns: unset;
  grid-column: 1 / -1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 6rem 2rem;
  gap: 1rem;
}

.spinner {
  width: 36px;
  height: 36px;
  border: 2px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}

@keyframes spin { to { transform: rotate(360deg); } }

.loading-state p {
  color: var(--text-dim);
  font-size: 0.85rem;
}

/* ── SCROLLBAR ── */
::-webkit-scrollbar { width: 8px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
::-webkit-scrollbar-thumb:hover { background: #3a3a3a; }

/* ── RESPONSIVE ── */
@media (max-width: 768px) {
  .header-inner { gap: 1rem; }
  .logo { font-size: 1.2rem; }
  .gallery { padding: 1rem 1rem 3rem; column-gap: 0.5rem; }
  .gallery-item { margin-bottom: 0.5rem; border-radius: var(--radius); }
  .tags-bar, .toolbar { padding-left: 1rem; padding-right: 1rem; }
  .pagination { padding: 0 1rem 3rem; }
}
</style>
</head>
<body>

<header class="header">
  <div class="header-inner">
    <div class="logo">r<span>34</span></div>
    <div class="search-wrap">
      <div class="search-bar">
        <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input class="search-input" id="searchInput" type="text" placeholder="Search tags..." autocomplete="off" spellcheck="false">
        <button class="search-btn" id="searchBtn">Search</button>
      </div>
      <div class="autocomplete-list" id="autocomplete"></div>
    </div>
  </div>
</header>

<div class="tags-bar" id="tagsBar"></div>

<div class="toolbar hidden" id="toolbar">
  <div class="result-info" id="resultInfo"></div>
  <div class="sort-wrap">
    <span class="sort-label">Sort</span>
    <select class="sort-select" id="sortSelect">
      <option value="score">Score</option>
      <option value="id">ID (Newest)</option>
      <option value="random">Random</option>
    </select>
  </div>
</div>

<div class="gallery" id="gallery">
  <div class="empty-state">
    <div class="empty-icon">◈</div>
    <h2>Search for tags</h2>
    <p>Type tags above to discover images and videos from the gallery.</p>
  </div>
</div>

<div class="pagination" id="pagination"></div>

<div class="lightbox" id="lightbox">
  <button class="lightbox-close" id="lbClose">&times;</button>
  <button class="lightbox-nav lightbox-prev" id="lbPrev">&#8249;</button>
  <button class="lightbox-nav lightbox-next" id="lbNext">&#8250;</button>
  <div class="lightbox-content" id="lbContent"></div>
  <div class="lightbox-info">
    <span class="lb-counter" id="lbCounter"></span>
    <span id="lbTags"></span>
  </div>
  <div class="lb-zoom-controls">
    <button class="lb-zoom-btn" id="lbZoomOut" title="Zoom Out">−</button>
    <span class="lb-zoom-level" id="lbZoomLevel">100%</span>
    <button class="lb-zoom-btn" id="lbZoomIn" title="Zoom In">+</button>
    <button class="lb-zoom-btn" id="lbZoomReset" title="Reset Zoom">↺</button>
  </div>
</div>

<script>
const API_BASE = 'https://api.rule34.xxx/index.php';
const AUTO_BASE = 'https://api.rule34.xxx/autocomplete.php';
const AI_FILTER = '-ai -ai_created -ai_assisted -ai_generated';
const API_KEY = '0fbe845fa16d24529e2279116af9acb2601218f80decc151c3c8abbbf8027ec18b7d8f4642f17ef6777674f5480c49a8dfb3ba8bf7aa98c1f0bab94ee188a0d9';
const USER_ID = '5943229';

const isVideoUrl = url => url && (url.endsWith('.mp4') || url.endsWith('.webm'));

let activeTags = [];
let currentPage = 0;
let allPosts = [];
let lbIndex = 0;
let acIndex = -1;
let acTimeout = null;

const $ = id => document.getElementById(id);
const searchInput = $('searchInput');
const autocompleteEl = $('autocomplete');
const tagsBar = $('tagsBar');
const gallery = $('gallery');
const toolbar = $('toolbar');
const resultInfo = $('resultInfo');
const pagination = $('pagination');
const lightbox = $('lightbox');
const lbContent = $('lbContent');
const lbCounter = $('lbCounter');
const lbTags = $('lbTags');

// ── AUTOCOMPLETE ──
searchInput.addEventListener('input', () => {
  clearTimeout(acTimeout);
  acIndex = -1;
  const val = searchInput.value.trim();
  if (!val) { autocompleteEl.classList.remove('active'); return; }
  acTimeout = setTimeout(() => fetchAutocomplete(val), 250);
});

searchInput.addEventListener('keydown', e => {
  const items = autocompleteEl.querySelectorAll('.autocomplete-item');
  if (e.key === 'ArrowDown') { e.preventDefault(); acIndex = Math.min(acIndex + 1, items.length - 1); updateAcHighlight(items); }
  else if (e.key === 'ArrowUp') { e.preventDefault(); acIndex = Math.max(acIndex - 1, 0); updateAcHighlight(items); }
  else if (e.key === 'Enter') {
    e.preventDefault();
    if (acIndex >= 0 && items[acIndex]) {
      addTag(items[acIndex].dataset.tag);
      searchInput.value = '';
      autocompleteEl.classList.remove('active');
    } else if (searchInput.value.trim()) {
      addTag(searchInput.value.trim());
      searchInput.value = '';
      autocompleteEl.classList.remove('active');
    }
  } else if (e.key === 'Escape') {
    autocompleteEl.classList.remove('active');
  }
});

function updateAcHighlight(items) {
  items.forEach((el, i) => el.classList.toggle('active', i === acIndex));
}

async function fetchAutocomplete(query) {
  try {
    const res = await fetch(`${AUTO_BASE}?q=${encodeURIComponent(query)}`);
    if (!res.ok) return;
    const data = await res.json();
    renderAutocomplete(data, query);
  } catch {}
}

function renderAutocomplete(results, query) {
  if (!results || !results.length) { autocompleteEl.classList.remove('active'); return; }
  autocompleteEl.innerHTML = results.slice(0, 12).map(r => {
    const tag = r.value || r;
    const count = r.count || '';
    const highlighted = highlightMatch(tag, query);
    return `<div class="autocomplete-item" data-tag="${tag}">${highlighted}${count ? `<span class="tag-count">${Number(count).toLocaleString()}</span>` : ''}</div>`;
  }).join('');
  autocompleteEl.classList.add('active');
  acIndex = -1;

  autocompleteEl.querySelectorAll('.autocomplete-item').forEach(el => {
    el.addEventListener('click', () => {
      addTag(el.dataset.tag);
      searchInput.value = '';
      autocompleteEl.classList.remove('active');
    });
  });
}

function highlightMatch(tag, query) {
  const idx = tag.toLowerCase().indexOf(query.toLowerCase());
  if (idx === -1) return tag;
  return tag.slice(0, idx) + `<span class="match">${tag.slice(idx, idx + query.length)}</span>` + tag.slice(idx + query.length);
}

// ── TAGS ──
function addTag(tag) {
  tag = tag.toLowerCase().trim();
  if (!tag || activeTags.includes(tag)) return;
  activeTags.push(tag);
  renderTags();
  fetchPosts();
}

function removeTag(tag) {
  activeTags = activeTags.filter(t => t !== tag);
  renderTags();
  if (activeTags.length) fetchPosts();
  else { gallery.innerHTML = emptyHTML(); toolbar.classList.add('hidden'); pagination.innerHTML = ''; }
}

function renderTags() {
  tagsBar.innerHTML = activeTags.map(t => `<span class="tag-pill">${t}<span class="remove" data-tag="${t}">&times;</span></span>`).join('');
  tagsBar.querySelectorAll('.remove').forEach(el => el.addEventListener('click', () => removeTag(el.dataset.tag)));
}

// ── FETCH POSTS ──
$('searchBtn').addEventListener('click', () => {
  const val = searchInput.value.trim();
  if (val) { addTag(val); searchInput.value = ''; }
});

searchInput.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !autocompleteEl.classList.contains('active')) {
    const val = searchInput.value.trim();
    if (val) { addTag(val); searchInput.value = ''; }
  }
});

$('sortSelect').addEventListener('change', () => { currentPage = 0; fetchPosts(); });

async function fetchPosts() {
  if (!activeTags.length) return;
  gallery.innerHTML = loadingHTML();
  toolbar.classList.add('hidden');
  pagination.innerHTML = '';

  const tags = [...activeTags, AI_FILTER].join(' ');
  const sort = $('sortSelect').value;
  const sortParam = sort === 'id' ? 'sort:id' : sort === 'random' ? 'sort:random' : 'sort:score:desc';
  const limit = 20;

  const url = `${API_BASE}?page=dapi&s=post&q=index&tags=${encodeURIComponent(tags + ' ' + sortParam)}&limit=${limit}&pid=${currentPage}&json=1&api_key=${API_KEY}&user_id=${USER_ID}`;

  try {
    const res = await fetch(url);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    allPosts = Array.isArray(data) ? data : (data.posts || []);
    renderGallery();
  } catch (err) {
    gallery.innerHTML = `<div class="empty-state"><div class="empty-icon">!</div><h2>Failed to load</h2><p>${err.message}</p></div>`;
  }
}

function renderGallery() {
  if (!allPosts.length) {
    gallery.innerHTML = `<div class="empty-state"><div class="empty-icon">◌</div><h2>No results</h2><p>Try different tags or check your spelling.</p></div>`;
    toolbar.style.display = 'none';
    pagination.innerHTML = '';
    return;
  }

  toolbar.classList.remove('hidden');
  resultInfo.innerHTML = `<strong>${allPosts.length}</strong> results for <strong>${activeTags.join(' + ')}</strong>`;

  gallery.innerHTML = allPosts.map((p, i) => {
    const fileUrl = p.file_url || p.sample_url || p.preview_url || '';
    const isVideo = isVideoUrl(fileUrl);
    const tags = (p.tags || '').split(' ').slice(0, 5);
    const delay = Math.min(i * 0.04, 0.6);
    return `<div class="gallery-item" data-index="${i}" style="animation-delay:${delay}s">
      ${isVideo
        ? `<video src="${fileUrl}" muted preload="auto" playsinline loop></video><div class="video-badge"><svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><polygon points="5,3 19,12 5,21"/></svg>MP4</div>`
        : `<img src="${p.sample_url || p.preview_url || fileUrl}" alt="" loading="lazy">`
      }
      <div class="gallery-overlay">
        <div class="overlay-tags">${tags.map(t => `<span class="overlay-tag">${t}</span>`).join('')}</div>
        <div class="overlay-stats">
          <span>▲ ${p.score ?? 0}</span>
          <span>♥ ${p.rating ?? '?'}</span>
        </div>
      </div>
    </div>`;
  }).join('');

  gallery.querySelectorAll('.gallery-item').forEach(el => {
    el.addEventListener('click', () => openLightbox(parseInt(el.dataset.index)));
    const video = el.querySelector('video');
    if (video) {
      let cycleTimeout = null;

      function startCycle() {
        video.currentTime = 0;
        video.muted = true;
        video.play().catch(() => {});
        cycleTimeout = setTimeout(function tick() {
          video.pause();
          video.currentTime += 10;
          cycleTimeout = setTimeout(() => {
            video.play().catch(() => {});
            cycleTimeout = setTimeout(tick, 3000);
          }, 200);
        }, 3000);
      }

      function stopCycle() {
        clearTimeout(cycleTimeout);
        video.pause();
        video.currentTime = 0;
      }

      el.addEventListener('mouseenter', startCycle);
      el.addEventListener('mouseleave', stopCycle);
    }
  });

  renderPagination();
}

// ── PAGINATION ──
function renderPagination() {
  const pages = [];
  const total = 20;
  let start = Math.max(0, currentPage - 3);
  let end = Math.min(total, currentPage + 4);

  pagination.innerHTML = '';

  const prevBtn = document.createElement('button');
  prevBtn.className = 'page-btn';
  prevBtn.innerHTML = '‹';
  prevBtn.disabled = currentPage === 0;
  prevBtn.addEventListener('click', () => { currentPage--; fetchPosts(); });
  pagination.appendChild(prevBtn);

  if (start > 0) {
    addPageBtn(0);
    if (start > 1) addEllipsis();
  }

  for (let i = start; i < end; i++) addPageBtn(i);

  if (end < total) {
    if (end < total - 1) addEllipsis();
    addPageBtn(total - 1);
  }

  const nextBtn = document.createElement('button');
  nextBtn.className = 'page-btn';
  nextBtn.innerHTML = '›';
  nextBtn.disabled = currentPage >= total - 1;
  nextBtn.addEventListener('click', () => { currentPage++; fetchPosts(); });
  pagination.appendChild(nextBtn);

  function addPageBtn(i) {
    const btn = document.createElement('button');
    btn.className = `page-btn${i === currentPage ? ' active' : ''}`;
    btn.textContent = i + 1;
    btn.addEventListener('click', () => { currentPage = i; fetchPosts(); });
    pagination.appendChild(btn);
  }

  function addEllipsis() {
    const el = document.createElement('span');
    el.className = 'page-ellipsis';
    el.textContent = '…';
    pagination.appendChild(el);
  }
}

// ── LIGHTBOX ──
function openLightbox(index) {
  lbIndex = index;
  resetZoom();
  renderLightbox();
  lightbox.classList.add('active');
  document.body.style.overflow = 'hidden';
}

function closeLightbox() {
  // Stop any playing video before closing
  const video = lbContent.querySelector('video');
  if (video) { video.pause(); video.src = ''; }
  lightbox.classList.remove('active');
  document.body.style.overflow = '';
  resetZoom();
}

function renderLightbox() {
  const p = allPosts[lbIndex];
  if (!p) return;
  const fileUrl = p.file_url || p.sample_url || '';
  const isVideo = isVideoUrl(fileUrl);

  if (isVideo) {
    lbContent.innerHTML = `<video src="${fileUrl}" controls autoplay playsinline muted style="max-width:90vw;max-height:85vh;border-radius:var(--radius-lg)"></video>`;
    const video = lbContent.querySelector('video');
    video.play().catch(() => {});
    video.addEventListener('canplay', () => {
      video.muted = false;
      video.play().catch(() => { video.muted = true; });
    }, { once: true });
    $('lbZoomLevel').parentElement.style.display = 'none';
  } else {
    lbContent.innerHTML = `<img src="${fileUrl}" alt="" style="max-width:90vw;max-height:85vh;border-radius:var(--radius-lg)">`;
    $('lbZoomLevel').parentElement.style.display = 'flex';
  }

  lbCounter.textContent = `${lbIndex + 1} / ${allPosts.length}`;
  lbTags.textContent = activeTags.join(' + ');
}

$('lbClose').addEventListener('click', closeLightbox);
$('lbPrev').addEventListener('click', () => { if (lbIndex > 0) { lbIndex--; resetZoom(); renderLightbox(); } });
$('lbNext').addEventListener('click', () => { if (lbIndex < allPosts.length - 1) { lbIndex++; resetZoom(); renderLightbox(); } });

lightbox.addEventListener('click', e => { if (e.target === lightbox) closeLightbox(); });

document.addEventListener('keydown', e => {
  if (!lightbox.classList.contains('active')) return;
  if (e.key === 'Escape') closeLightbox();
  if (e.key === 'ArrowLeft' && lbIndex > 0) { lbIndex--; renderLightbox(); }
  if (e.key === 'ArrowRight' && lbIndex < allPosts.length - 1) { lbIndex++; renderLightbox(); }
});

// ── LIGHTBOX ZOOM ──
let zoomScale = 1;
let zoomTX = 0;
let zoomTY = 0;
let isPanning = false;
let panStartX = 0;
let panStartY = 0;
let panStartTX = 0;
let panStartTY = 0;
const ZOOM_MIN = 0.5;
const ZOOM_MAX = 8;
const ZOOM_STEP = 0.3;

function applyZoom() {
  if (zoomScale <= 1.01) {
    zoomScale = 1;
    zoomTX = 0;
    zoomTY = 0;
    lbContent.classList.remove('zoomed');
    lbContent.style.transform = '';
  } else {
    lbContent.classList.add('zoomed');
    lbContent.style.transform = `translate(${zoomTX}px, ${zoomTY}px) scale(${zoomScale})`;
  }
  $('lbZoomLevel').textContent = `${Math.round(zoomScale * 100)}%`;
}

function zoomAt(cursorX, cursorY, newScale) {
  const rect = lbContent.getBoundingClientRect();
  const cx = cursorX - rect.left;
  const cy = cursorY - rect.top;
  
  const imgX = (cx - zoomTX) / zoomScale;
  const imgY = (cy - zoomTY) / zoomScale;
  
  zoomScale = Math.max(ZOOM_MIN, Math.min(ZOOM_MAX, newScale));
  
  zoomTX = cx - imgX * zoomScale;
  zoomTY = cy - imgY * zoomScale;
  
  applyZoom();
}

function zoomIn() {
  const rect = lbContent.getBoundingClientRect();
  zoomAt(rect.left + rect.width / 2, rect.top + rect.height / 2, zoomScale + ZOOM_STEP);
}

function zoomOut() {
  const rect = lbContent.getBoundingClientRect();
  zoomAt(rect.left + rect.width / 2, rect.top + rect.height / 2, zoomScale - ZOOM_STEP);
}

function resetZoom() {
  zoomScale = 1;
  zoomTX = 0;
  zoomTY = 0;
  applyZoom();
}

$('lbZoomIn').addEventListener('click', e => { e.stopPropagation(); zoomIn(); });
$('lbZoomOut').addEventListener('click', e => { e.stopPropagation(); zoomOut(); });
$('lbZoomReset').addEventListener('click', e => { e.stopPropagation(); resetZoom(); });

// Click to zoom at cursor (images only)
lbContent.addEventListener('click', e => {
  const p = allPosts[lbIndex];
  if (!p || isVideoUrl(p.file_url || p.sample_url || '')) return;
  e.stopPropagation();
  
  if (zoomScale <= 1.01) {
    zoomAt(e.clientX, e.clientY, 2.5);
  } else {
    resetZoom();
  }
});

// Wheel zoom at cursor
lbContent.addEventListener('wheel', e => {
  const p = allPosts[lbIndex];
  if (!p || isVideoUrl(p.file_url || p.sample_url || '')) return;
  e.preventDefault();
  e.stopPropagation();
  
  const delta = e.deltaY > 0 ? -ZOOM_STEP : ZOOM_STEP;
  zoomAt(e.clientX, e.clientY, zoomScale + delta);
}, { passive: false });

// Pan when zoomed
lbContent.addEventListener('mousedown', e => {
  const p = allPosts[lbIndex];
  if (!p || isVideoUrl(p.file_url || p.sample_url || '') || zoomScale <= 1.01) return;
  if (e.target.tagName === 'VIDEO') return;
  isPanning = true;
  panStartX = e.clientX;
  panStartY = e.clientY;
  panStartTX = zoomTX;
  panStartTY = zoomTY;
  lbContent.style.cursor = 'grabbing';
  e.preventDefault();
});

document.addEventListener('mousemove', e => {
  if (!isPanning) return;
  zoomTX = panStartTX + (e.clientX - panStartX);
  zoomTY = panStartTY + (e.clientY - panStartY);
  lbContent.style.transform = `translate(${zoomTX}px, ${zoomTY}px) scale(${zoomScale})`;
});

document.addEventListener('mouseup', () => {
  if (isPanning) {
    isPanning = false;
    lbContent.style.cursor = zoomScale > 1.01 ? 'grab' : 'zoom-in';
  }
});

// Keyboard zoom
document.addEventListener('keydown', e => {
  if (!lightbox.classList.contains('active')) return;
  if (e.key === '+' || e.key === '=') { e.preventDefault(); zoomIn(); }
  if (e.key === '-') { e.preventDefault(); zoomOut(); }
  if (e.key === '0') { e.preventDefault(); resetZoom(); }
});
function loadingHTML() {
  return `<div class="loading-state"><div class="spinner"></div><p>Loading gallery...</p></div>`;
}

function emptyHTML() {
  return `<div class="empty-state"><div class="empty-icon">◈</div><h2>Search for tags</h2><p>Type tags above to discover images and videos from the gallery.</p></div>`;
}

// Close autocomplete on outside click
document.addEventListener('click', e => {
  if (!e.target.closest('.search-wrap')) autocompleteEl.classList.remove('active');
});
</script>
